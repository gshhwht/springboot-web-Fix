# Server Configuration
server.port=8080

# Application Name
spring.application.name=vulnerable-spring-boot

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (Vulnerability: Exposed H2 Console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Actuator Configuration (Vulnerability: All endpoints exposed)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.env.show-values=ALWAYS

# Security (Vulnerability: Disabled CSRF protection)
spring.security.enabled=false

# Logging Configuration (Vulnerability: Verbose logging)
logging.level.root=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=DEBUG

# Error Handling (Vulnerability: Detailed error messages)
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

# CORS (Vulnerability: Allow all origins)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=*
spring.web.cors.allowed-headers=*

# Session Configuration (Vulnerability: Insecure session settings)
server.servlet.session.timeout=30d
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=false

# src/main/resources/application.properties
admin.username=admin
admin.password=admin123
jwt.secret=my-secret-key-12345

encryption.key=MTIzNDU2Nzg5MDEyMzQ1Ng==

